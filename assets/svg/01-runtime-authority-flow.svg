<svg width="1600" height="620" viewBox="0 0 1600 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="XAIPT Runtime Authority Flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="55%" stop-color="#eef7ff"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="55%" stop-color="#2563eb"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.title{font:900 56px Segoe UI,Arial,sans-serif;fill:#0f172a;letter-spacing:4px}.sub{font:600 22px Segoe UI,Arial,sans-serif;fill:#475569;letter-spacing:1.4px}.boxTitle{font:900 22px Segoe UI,Arial,sans-serif;fill:#0f172a}.boxText{font:500 15px Segoe UI,Arial,sans-serif;fill:#475569}.num{font:900 26px Segoe UI,Arial,sans-serif;fill:#ffffff}.line{stroke:url(#flow);stroke-width:7;stroke-linecap:round;stroke-dasharray:28 22;animation:dash 6s linear infinite;filter:url(#glow)}.pulse{animation:pulse 2.4s ease-in-out infinite}.float{animation:float 5s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-300}}@keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}} </style>
  </defs>
  <rect width="1600" height="620" rx="34" fill="url(#bg)"/>
  <path d="M70 105 C330 40 520 110 780 72 S1190 20 1530 98" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="10 16" opacity=".65"/>
  <path d="M80 520 C310 455 540 565 785 485 S1190 420 1528 510" fill="none" stroke="#fdba74" stroke-width="2" stroke-dasharray="10 16" opacity=".65"/>
  <text x="800" y="86" text-anchor="middle" class="title">XAIPT RUNTIME AUTHORITY FLOW</text>
  <text x="800" y="122" text-anchor="middle" class="sub">REQUEST → RISK → HOLD → REVIEW → APPROVE / DENY → EXECUTION</text>
  <line x1="180" y1="330" x2="1420" y2="330" class="line"/>
  <g filter="url(#shadow)" class="float"><rect x="75" y="240" width="190" height="160" rx="26" fill="#ffffff" stroke="#bfdbfe"/><circle cx="170" cy="220" r="32" fill="url(#flow)" filter="url(#glow)"/><text x="170" y="229" text-anchor="middle" class="num">01</text><text x="170" y="305" text-anchor="middle" class="boxTitle">REQUEST</text><text x="170" y="335" text-anchor="middle" class="boxText">Action intent enters</text><text x="170" y="358" text-anchor="middle" class="boxText">governance runtime</text></g>
  <g filter="url(#shadow)" class="float" style="animation-delay:.3s"><rect x="315" y="240" width="190" height="160" rx="26" fill="#ffffff" stroke="#bfdbfe"/><circle cx="410" cy="220" r="32" fill="url(#flow)" filter="url(#glow)"/><text x="410" y="229" text-anchor="middle" class="num">02</text><text x="410" y="305" text-anchor="middle" class="boxTitle">RISK</text><text x="410" y="335" text-anchor="middle" class="boxText">Context, pressure</text><text x="410" y="358" text-anchor="middle" class="boxText">and anomaly signals</text></g>
  <g filter="url(#shadow)" class="pulse"><rect x="555" y="220" width="210" height="200" rx="30" fill="#fff7ed" stroke="#f97316" stroke-width="3"/><circle cx="660" cy="205" r="38" fill="#f97316" filter="url(#glow)"/><text x="660" y="215" text-anchor="middle" class="num">03</text><text x="660" y="300" text-anchor="middle" class="boxTitle">HOLD</text><text x="660" y="333" text-anchor="middle" class="boxText">Execution paused</text><text x="660" y="356" text-anchor="middle" class="boxText">before finality</text><text x="660" y="385" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" font-weight="800" fill="#ea580c">BOUNDARY ACTIVE</text></g>
  <g filter="url(#shadow)" class="float" style="animation-delay:.6s"><rect x="815" y="240" width="190" height="160" rx="26" fill="#ffffff" stroke="#bfdbfe"/><circle cx="910" cy="220" r="32" fill="url(#flow)" filter="url(#glow)"/><text x="910" y="229" text-anchor="middle" class="num">04</text><text x="910" y="305" text-anchor="middle" class="boxTitle">REVIEW</text><text x="910" y="335" text-anchor="middle" class="boxText">Human / trusted</text><text x="910" y="358" text-anchor="middle" class="boxText">authority checkpoint</text></g>
  <g filter="url(#shadow)" class="float" style="animation-delay:.9s"><rect x="1055" y="240" width="190" height="160" rx="26" fill="#ffffff" stroke="#fed7aa"/><circle cx="1150" cy="220" r="32" fill="url(#flow)" filter="url(#glow)"/><text x="1150" y="229" text-anchor="middle" class="num">05</text><text x="1150" y="305" text-anchor="middle" class="boxTitle">DECIDE</text><text x="1150" y="335" text-anchor="middle" class="boxText">Approve or deny</text><text x="1150" y="358" text-anchor="middle" class="boxText">execution branch</text></g>
  <g filter="url(#shadow)" class="float" style="animation-delay:1.2s"><rect x="1295" y="240" width="190" height="160" rx="26" fill="#ffffff" stroke="#fed7aa"/><circle cx="1390" cy="220" r="32" fill="url(#flow)" filter="url(#glow)"/><text x="1390" y="229" text-anchor="middle" class="num">06</text><text x="1390" y="305" text-anchor="middle" class="boxTitle">EXECUTE</text><text x="1390" y="335" text-anchor="middle" class="boxText">Controlled final</text><text x="1390" y="358" text-anchor="middle" class="boxText">state transition</text></g>
  <text x="800" y="555" text-anchor="middle" font-family="Segoe UI,Arial" font-size="27" font-weight="900" fill="#f97316" letter-spacing="2">HOLD BEFORE FINALITY • AUTHORITY BEFORE EXECUTION</text>
</svg>
