<svg width="1600" height="620" viewBox="0 0 1600 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="XAIPT Runtime Telemetry and Audit Visibility">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="60%" stop-color="#f0f9ff"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient><linearGradient id="accent" x1="0" x2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="60%" stop-color="#2563eb"/><stop offset="100%" stop-color="#f97316"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity=".15"/></filter><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:900 54px Segoe UI,Arial,sans-serif;fill:#0f172a;letter-spacing:4px}.sub{font:600 21px Segoe UI,Arial,sans-serif;fill:#475569}.head{font:900 20px Segoe UI,Arial,sans-serif;fill:#2563eb}.cell{font:600 18px Segoe UI,Arial,sans-serif;fill:#334155}.small{font:500 15px Segoe UI,Arial,sans-serif;fill:#64748b}.trace{stroke:url(#accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:18 18;animation:dash 5s linear infinite;filter:url(#glow)}.blink{animation:blink 1.8s ease-in-out infinite}.float{animation:float 5s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-220}}@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}} </style></defs>
  <rect width="1600" height="620" rx="34" fill="url(#bg)"/><text x="800" y="82" text-anchor="middle" class="title">RUNTIME TELEMETRY &amp; AUDIT VISIBILITY</text><text x="800" y="118" text-anchor="middle" class="sub">Every high-risk transition should remain readable, reviewable, and accountable.</text>
  <g filter="url(#shadow)"><rect x="90" y="170" width="920" height="360" rx="30" fill="#ffffff" stroke="#bfdbfe"/><rect x="120" y="205" width="860" height="54" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><text x="150" y="240" class="head">Time</text><text x="360" y="240" class="head">Event</text><text x="680" y="240" class="head">State</text><text x="830" y="240" class="head">Authority</text><g class="blink"><circle cx="132" cy="300" r="8" fill="#0ea5e9"/></g><text x="150" y="306" class="cell">09:41:02</text><text x="360" y="306" class="cell">Request created</text><text x="680" y="306" class="cell">Pending</text><text x="830" y="306" class="cell">Primary</text><g class="blink" style="animation-delay:.3s"><circle cx="132" cy="360" r="8" fill="#f97316"/></g><text x="150" y="366" class="cell">09:41:06</text><text x="360" y="366" class="cell">Risk detected</text><text x="680" y="366" class="cell">HOLD</text><text x="830" y="366" class="cell">System</text><g class="blink" style="animation-delay:.6s"><circle cx="132" cy="420" r="8" fill="#2563eb"/></g><text x="150" y="426" class="cell">09:41:12</text><text x="360" y="426" class="cell">Authority review required</text><text x="680" y="426" class="cell">Review</text><text x="830" y="426" class="cell">Trusted Device</text><g class="blink" style="animation-delay:.9s"><circle cx="132" cy="480" r="8" fill="#22c55e"/></g><text x="150" y="486" class="cell">09:42:01</text><text x="360" y="486" class="cell">Decision branch resolved</text><text x="680" y="486" class="cell">Approved / Denied</text><text x="830" y="486" class="cell">Human Authority</text></g>
  <path d="M1010 350 C1085 350 1090 230 1180 230" class="trace"/><path d="M1010 350 C1085 350 1090 470 1180 470" class="trace"/>
  <g filter="url(#shadow)" class="float"><rect x="1180" y="180" width="330" height="130" rx="28" fill="#ffffff" stroke="#bfdbfe"/><text x="1220" y="230" class="head">Trust Runtime</text><text x="1220" y="262" class="small">Risk, authority, delay, and audit</text><text x="1220" y="286" class="small">shape execution behavior.</text></g>
  <g filter="url(#shadow)" class="float" style="animation-delay:.8s"><rect x="1180" y="410" width="330" height="130" rx="28" fill="#ffffff" stroke="#fed7aa"/><text x="1220" y="460" class="head">Audit Chain</text><text x="1220" y="492" class="small">State transitions remain visible</text><text x="1220" y="516" class="small">for governance review.</text></g>
  <text x="800" y="575" text-anchor="middle" font-family="Segoe UI,Arial" font-size="24" font-weight="900" fill="#f97316" letter-spacing="1.6">VISIBILITY BEFORE TRUST • AUDIT BEFORE FINALITY</text>
</svg>
